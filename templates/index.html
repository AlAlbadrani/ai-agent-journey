<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Challenge Agent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1e1e2e;
            color: #cdd6f4;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #app {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            background: #181825;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        #header {
            padding: 16px 24px;
            background: #313244;
            font-size: 18px;
            font-weight: 600;
            color: #cba6f7;
            border-bottom: 1px solid #45475a;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 14px;
            white-space: pre-wrap;
        }

        .user {
            background: #cba6f7;
            color: #1e1e2e;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .agent {
            background: #313244;
            color: #cdd6f4;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .thinking {
            background: #313244;
            color: #6c7086;
            align-self: flex-start;
            font-style: italic;
        }

        #input-area {
            padding: 16px 24px;
            background: #313244;
            display: flex;
            gap: 12px;
            border-top: 1px solid #45475a;
        }

        #input {
            flex: 1;
            padding: 12px 16px;
            background: #1e1e2e;
            border: 1px solid #45475a;
            border-radius: 8px;
            color: #cdd6f4;
            font-size: 14px;
            outline: none;
            font-family: inherit;
        }

        #input:focus {
            border-color: #cba6f7;
        }

        #send {
            padding: 12px 24px;
            background: #cba6f7;
            color: #1e1e2e;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: opacity 0.2s;
        }

        #send:hover {
            opacity: 0.85;
        }

        #send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Scrollbar */
        #messages::-webkit-scrollbar {
            width: 6px;
        }
        #messages::-webkit-scrollbar-track {
            background: #181825;
        }
        #messages::-webkit-scrollbar-thumb {
            background: #45475a;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="header">🧩 Code Challenge Agent</div>
        <div id="messages"></div>
        <div id="input-area">
            <input 
                type="text" 
                id="input" 
                placeholder="Type a message or paste a file path..." 
                autocomplete="off"
            />
            <button id="send">Send</button>
        </div>
    </div>

    <script>
        const messages = document.getElementById('messages');
        const input = document.getElementById('input');
        const send = document.getElementById('send');

        function addMessage(text, type) {
        const div = document.createElement('div');
        div.classList.add('message', type);
        if (type === 'agent') {
            div.innerHTML = text;
        } else {
            div.textContent = text;
        }
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
        return div;
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            input.value = '';
            send.disabled = true;

            const thinking = addMessage('Coach is thinking...', 'thinking');

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await res.json();
                thinking.remove();
                addMessage(data.response, 'agent');
            } catch (err) {
                thinking.remove();
                addMessage('Error connecting to agent.', 'thinking');
            }

            send.disabled = false;
            input.focus();
        }

        send.addEventListener('click', sendMessage);
        input.addEventListener('keydown', e => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
